services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8013:8013"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-5}
      - HEARTBEAT_TIMEOUT=${HEARTBEAT_TIMEOUT:-30}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
