services:
  redis:
    image: redis:7-alpine
    ports:
      - "6418:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8018:8018"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCATION_TTL=${LOCATION_TTL:-60}
      - NEARBY_RADIUS_MILES=${NEARBY_RADIUS_MILES:-5}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8018/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
