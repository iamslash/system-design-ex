version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8024:8024"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=8024
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
