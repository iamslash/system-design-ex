services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8015:8015"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VIDEO_STORAGE_PATH=/data/videos
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - video-data:/data/videos
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8015/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
  video-data:
