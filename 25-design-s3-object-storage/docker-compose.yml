services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8025:8025"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/data
      - API_PORT=8025
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8025/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - object-data:/data

volumes:
  redis-data:
  object-data:
